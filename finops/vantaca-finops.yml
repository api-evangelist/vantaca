meters:
- name: platform_subscription
  description: Vantaca platform license under which API access is provisioned (quoted by sales; not public).
  unit: contract
  aggregation: sum
  dimensions:
  - management_company
- name: api_requests
  description: Standard API calls made against a granted dataset - tracked internally by the integrator; Vantaca publishes no per-call price.
  unit: requests
  aggregation: sum
  dimensions:
  - credential
  - association
  - endpoint
- name: integration_compute
  description: Vendor's own compute/hosting cost to poll and process Vantaca data (no Vantaca invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - integration
principles:
- name: Visibility
  description: Track API call volume per credential and association even though Vantaca does not bill per call, to understand load and integration health.
- name: Allocation
  description: Map each set of vendor credentials to the management company / associations it serves so integration effort maps to internal cost centers.
- name: Optimization
  description: Batch bulk reads with zip=true and cache reference data (association lists, provider types, GL codes) to minimize redundant calls and bandwidth.
- name: Accountability
  description: Assign an owner per integration credential; review platform subscription and integration engineering cost against value delivered.
