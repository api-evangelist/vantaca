description: >-
  FinOps view of Vantaca spend. Vantaca's Standard APIs are not sold as a
  usage-metered product with public per-call rates. API access is a capability of
  the Vantaca platform subscription (licensed to management companies, quoted by
  sales) and, for third parties, a customer-authorized vendor grant. There is no
  published API invoice line item; cost is embedded in the platform relationship.
  The dominant integration costs are therefore the platform subscription and the
  vendor's own engineering/hosting to consume the API - not a per-request Vantaca fee.
notes: >-
  Vantaca publishes no API meter or per-unit rate, so FOCUS meters below are
  modeled as internal cost-tracking dimensions rather than reconciled Vantaca
  billing units. Verify commercial terms with Vantaca during reconciliation.
