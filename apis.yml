  baseURL: https://api.vantaca.net
  properties:
  - url: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
    type: APIReference
  - url: openapi/vantaca-openapi.json
    type: OpenAPI
  description: Manage service providers (vendors) and their insurance records - list
    providers and provider types, read a single provider, create and update
    providers, and CRUD provider insurance. Backed by /read/provider,
    /read/providerSingle, /read/providerTypeList, /AP/providerList and the
    /write/provider* endpoints.
