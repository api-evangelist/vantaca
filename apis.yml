  humanURL: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
  baseURL: https://api.vantaca.net
  properties:
  - url: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
    type: APIReference
  - url: openapi/vantaca-openapi.json
    type: OpenAPI
  description: Manage association accounting - create, read, update, pay, void, and
    delete invoices; list payments; retrieve GL codes, funds, bank accounts and
    balances, GL transaction history; and create, update, write off, or delete
    homeowner ledger entries. Backed by the /AP/ invoice, payment, bank, fund and GL
    endpoints plus /write/createLedger and /write/ledgerDelete.
