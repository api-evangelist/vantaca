apis:
- aid: vantaca:vantaca-associations-api
  name: Vantaca Associations API
  tags:
  - Associations
  - HOA
  - Community Association Management
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
  baseURL: https://api.vantaca.net
  properties:
  - url: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
    type: APIReference
  - url: openapi/vantaca-openapi.json
    type: OpenAPI
  description: Retrieve the associations (communities) a vendor has been granted access
    to, along with association details, additional info, and address records. Backed
    by the /read/Association, /read/associationDetails, /read/associationAdditionalInfo,
    /read/AssociationAddress and /AP/associationList endpoints.
- aid: vantaca:vantaca-homeowner-accounts-api
  name: Vantaca Homeowner Accounts API
  tags:
  - Homeowners
  - Accounts
  - Ledger
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
  baseURL: https://api.vantaca.net
  properties:
  - url: https://app.swaggerhub.com/apis/Vantaca/vantacaStandard/3.8.0
    type: APIReference
  - url: openapi/vantaca-openapi.json
    type: OpenAPI
  description: Look up homeowner accounts and their financial and contact records -
    account info, homeowner search, transactions, assessments, tenants, and CRUD on
    a homeowner's address, email, phone, name, and communication/billing preferences.
    Backed by /read/homeownerAccountInfo, /read/homeownerSearch, /read/homeownerTransactions,
    /read/homeownerAssessment, /read/getTenantData and the /write/ contact endpoints.
- aid: vantaca:vantaca-accounts-payable-ledger-api
  name: Vantaca Accounts Payable & Ledger API
  tags:
  - Accounts Payable
  - Ledger
  - Accounting
  - Payments
